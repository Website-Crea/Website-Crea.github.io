<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Annotation</title>
    <!-- Use Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Vision Annotator</h1>
            <p>Upload up to 10 images to get instant descriptions using Gemini via Novita.</p>
        </header>

        <div id="auth-section" class="section active">
            <div class="input-group">
                <label for="password">Enter Master Password to Unlock API</label>
                <div style="display: flex; gap: 10px;">
                    <input type="password" id="password" placeholder="••••••••" />
                    <button id="unlock-btn" class="btn primary">Unlock Settings</button>
                </div>
            </div>
            <div id="auth-error" class="error-text hidden"></div>
        </div>

        <div id="app-section" class="section hidden">
            <div class="upload-area" id="upload-area">
                <p>Drag & Drop up to 10 images here</p>
                <label class="btn secondary">
                    Browse Files
                    <input type="file" id="file-input" multiple accept="image/*" class="hidden-input" />
                </label>
            </div>
            
            <div id="file-preview-container" class="preview-grid hidden"></div>
            
            <div class="action-bar">
                <button id="run-btn" class="btn primary disabled" disabled>Run Inference</button>
            </div>
            
            <div id="results-container" class="results-container hidden">
                <h2>Results</h2>
                <div id="results-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
